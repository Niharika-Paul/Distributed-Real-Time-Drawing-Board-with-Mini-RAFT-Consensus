server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── WebSocket proxy → gateway ─────────────────────────────────────────
    location /ws {
        proxy_pass         http://gateway:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Committed stroke notifications (replica → gateway) ───────────────
    location /committed {
        proxy_pass http://gateway:8000/committed;
        proxy_set_header Host $host;
    }

    # ── Gateway health ────────────────────────────────────────────────────
    location /health {
        proxy_pass http://gateway:8000/health;
        proxy_set_header Host $host;
    }

    # ── Replica status polling (CORS proxy) ──────────────────────────────
    location /replica1/ {
        proxy_pass http://replica1:8001/;
        add_header Access-Control-Allow-Origin *;
        proxy_set_header Host $host;
    }
    location /replica2/ {
        proxy_pass http://replica2:8002/;
        add_header Access-Control-Allow-Origin *;
        proxy_set_header Host $host;
    }
    location /replica3/ {
        proxy_pass http://replica3:8003/;
        add_header Access-Control-Allow-Origin *;
        proxy_set_header Host $host;
    }

    # ── Static files ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Access-Control-Allow-Origin *;
    }
}
